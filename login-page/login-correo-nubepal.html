<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="theme-color" content="#0c5adb">
    <title>Nubepal Desk | Acceso Corporativo</title>

    <script>
        if (location.protocol !== 'https:') {
            location.replace(`https:${location.href.substring(location.protocol.length)}`);
        }
    </script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link rel="icon" href="https://nubepal.com/favicon.ico" type="image/x-icon">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0056b3",
                        accent: "#3b82f6",
                        "nubepal-blue": "#0A369D",
                        "nubepal-navy": "#021033",
                        "nubepal-card": "#051C4F",
                        "nubepal-input": "#0f2863",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(59, 130, 246, 0.15)',
                        'sheet': '0 -10px 40px -5px rgba(0, 0, 0, 0.6)',
                    }
                },
            },
        };
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        [x-cloak] {
            display: none !important;
        }
        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-logo-load {
            animation: pulse-logo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body
    class="font-sans antialiased min-h-[100dvh] lg:h-screen lg:overflow-hidden bg-nubepal-navy text-white selection:bg-accent selection:text-white"
    x-data="{ 
          loading: true,
          mobileLoginOpen: false,
          
          // Índices activos independientes para que cada vista tenga su propio ritmo
          mobileActive: 0,
          desktopActive: 0,

          // UNICA FUENTE DE DATOS (Móvil y Escritorio comparten esto)
          slides: [
              { 
                  tagline: 'Gestión Centralizada', 
                  title: 'Tu Sede Digital', 
                  desc: 'Bienvenido a tu centro de mando. Gestiona tus comunicaciones empresariales con la infraestructura sólida que tu negocio merece.',
                  icon: 'domain' // Icono de edificio/sede
              },
              { 
                  tagline: 'Imagen Profesional', 
                  title: 'Proyecta Confianza', 
                  desc: 'Cada correo cuenta. Utiliza tu dominio corporativo para fortalecer tu marca y diferenciarte de la competencia.',
                  icon: 'verified' // Icono de verificación
              },
              { 
                  tagline: 'Seguridad Garantizada', 
                  title: 'Datos Protegidos', 
                  desc: 'Tu información es valiosa. Contamos con filtros avanzados y copias de seguridad automáticas para mantener tu negocio seguro.',
                  icon: 'admin_panel_settings' // Icono de seguridad
              },
              { 
                  tagline: 'Movilidad Total', 
                  title: 'Oficina en tu Bolsillo', 
                  desc: 'Accede a tus correos desde Outlook, Webmail o tu Smartphone. Tu negocio se mueve contigo, estés donde estés.',
                  icon: 'smartphone' // Icono de móvil
              }
          ],

          init() {
              setTimeout(() => this.loading = false, 1500);
              
              // Rotación Móvil (4 segundos)
              setInterval(() => { 
                  this.mobileActive = this.mobileActive === (this.slides.length - 1) ? 0 : this.mobileActive + 1 
              }, 4000);

              // Rotación Escritorio (6 segundos - más lento para leer)
              setInterval(() => { 
                  this.desktopActive = this.desktopActive === (this.slides.length - 1) ? 0 : this.desktopActive + 1 
              }, 6000);
          }
      }">

    <div x-show="loading" x-transition:leave="transition ease-in duration-500" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-[60] bg-nubepal-navy flex flex-col items-center justify-center">
        <img src="https://panel.nubepal.com/templates/lagom2/assets/img/logo/logo_big_inverse.174176660.png"
            alt="Cargando..." class="h-12 w-auto animate-logo-load">
        <div class="mt-4 text-blue-400/50 text-xs font-medium tracking-[0.2em]">INICIANDO CORREO CORPORATIVO</div>
    </div>

    <div class="flex flex-col lg:flex-row h-full w-full opacity-0"
        :class="loading ? 'opacity-0' : 'opacity-100 transition-opacity duration-700'">

        <div class="hidden lg:flex lg:w-1/2 xl:w-5/12 bg-nubepal-blue relative flex-col justify-between p-12 overflow-hidden h-full">
            
            <div class="absolute inset-0 bg-[url('https://source.unsplash.com/random/1600x900?technology,server,blue')] bg-cover bg-center opacity-20 mix-blend-overlay"></div>
            <div class="absolute inset-0 bg-gradient-to-br from-nubepal-navy/95 via-nubepal-blue/90 to-primary/30"></div>

            <div class="relative z-10 mt-4">
                <a href="https://nubepal.com" title="Volver a Nubepal" 
                   class="inline-block transition-transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-accent rounded-lg">
                    <img src="https://panel.nubepal.com/templates/lagom2/assets/img/logo/logo_big_inverse.174176660.png"
                        alt="NubePal Correo Corporativo" class="h-11 w-auto opacity-90 hover:opacity-100 transition-opacity">
                </a>
            </div>

            <div class="relative z-10 flex-1 flex flex-col justify-center max-w-lg mb-12">
                <div class="relative h-64 w-full"> 
                    <template x-for="(slide, index) in slides" :key="index">
                        <div x-show="desktopActive === index"
                             x-transition:enter="transition ease-out duration-700"
                             x-transition:enter-start="opacity-0 translate-y-8"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             x-transition:leave="transition ease-in duration-300"
                             x-transition:leave-start="opacity-100 translate-y-0"
                             x-transition:leave-end="opacity-0 -translate-y-8"
                             class="absolute inset-0 flex flex-col justify-center">
                            
                            <p class="text-accent font-bold tracking-widest uppercase text-xs mb-3" x-text="slide.tagline"></p>
                            <h1 class="text-4xl xl:text-5xl font-bold text-white mb-6 leading-tight" x-text="slide.title"></h1>
                            <p class="text-blue-100 text-lg leading-relaxed font-light border-l-4 border-accent pl-5" x-text="slide.desc"></p>
                        </div>
                    </template>
                </div>

                <div class="flex gap-3 mt-4">
                    <template x-for="(slide, index) in slides" :key="index">
                        <button @click="desktopActive = index" 
                                class="h-3 w-3 rounded-full transition-all duration-300 border border-transparent"
                                :class="desktopActive === index ? 'bg-white scale-110' : 'bg-white/20 hover:bg-white/40'">
                        </button>
                    </template>
                </div>
            </div>

            <div class="relative z-10 flex items-center justify-between text-xs text-blue-400/60 border-t border-white/10 pt-6">
                <span>Nubepal Correo Corporativo v2.0</span>
                <span>Powered by Cuestas Enterprises</span>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative w-full bg-nubepal-navy min-h-[100dvh] lg:min-h-0 lg:h-full lg:items-center lg:justify-center">

            <div class="absolute inset-0 bg-gradient-to-b from-nubepal-blue/30 to-nubepal-navy lg:hidden pointer-events-none"></div>

            <div class="lg:hidden flex-1 flex flex-col items-center justify-between p-6 relative z-10 w-full">
                <div class="mt-8 w-full flex justify-center shrink-0">
                    <a href="https://nubepal.com" class="inline-block transition-transform active:scale-95">
                        <img src="https://panel.nubepal.com/templates/lagom2/assets/img/logo/logo_big_inverse.174176660.png"
                            alt="NubePal" class="h-10 w-auto">
                    </a>
                </div>

                <div class="w-full max-w-xs text-center flex-1 flex flex-col justify-center">
                    <div class="relative h-64 w-full"> <template x-for="(slide, index) in slides" :key="index">
                            <div x-show="mobileActive === index" x-transition:enter="transition ease-out duration-500"
                                x-transition:enter-start="opacity-0 transform translate-x-10 scale-95"
                                x-transition:enter-end="opacity-100 transform translate-x-0 scale-100"
                                x-transition:leave="transition ease-in duration-300"
                                x-transition:leave-start="opacity-100 transform translate-x-0"
                                x-transition:leave-end="opacity-0 transform -translate-x-10"
                                class="absolute inset-0 flex flex-col items-center justify-center">
                                
                                <div class="w-20 h-20 rounded-3xl bg-gradient-to-tr from-primary to-nubepal-blue flex items-center justify-center shadow-glow mb-6 border border-white/10">
                                    <span class="material-icons-round text-4xl text-white" x-text="slide.icon"></span>
                                </div>
                                
                                <h3 class="text-2xl font-bold text-white mb-3" x-text="slide.title"></h3>
                                <p class="text-blue-200 text-sm leading-relaxed px-4" x-text="slide.desc"></p>
                            </div>
                        </template>
                    </div>

                    <div class="flex justify-center space-x-2 mt-6">
                        <template x-for="(slide, index) in slides" :key="index">
                            <button @click="mobileActive = index" class="h-1.5 rounded-full transition-all duration-300"
                                :class="mobileActive === index ? 'w-8 bg-accent' : 'w-2 bg-blue-800'">
                            </button>
                        </template>
                    </div>
                </div>

                <div class="w-full mb-8 shrink-0">
                    <button @click="mobileLoginOpen = true"
                        class="w-full bg-white text-nubepal-navy font-bold py-4 rounded-xl shadow-lg shadow-blue-900/40 hover:bg-gray-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                        INGRESAR A MI CUENTA
                        <span class="material-icons-round">login</span>
                    </button>
                    <p class="text-center text-blue-400 text-xs mt-4 pb-4">¿No tienes cuenta? <a
                            href="https://nubepal.com" class="text-white underline">Regístrate</a></p>
                </div>
            </div>

            <div x-show="mobileLoginOpen" x-transition:enter="transition-opacity ease-linear duration-300"
                x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
                x-transition:leave="transition-opacity ease-linear duration-300" x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0" @click="mobileLoginOpen = false"
                class="fixed inset-0 bg-black/80 z-40 lg:hidden backdrop-blur-sm">
            </div>

            <div class="z-50 w-full bg-nubepal-card transition-transform duration-500 cubic-bezier(0.32, 0.72, 0, 1)
                    /* MOBILE */
                    fixed bottom-0 left-0 right-0 rounded-t-[32px] shadow-sheet border-t border-white/10 transform translate-y-full max-h-[90dvh] overflow-y-auto
                    /* DESKTOP */
                    lg:relative lg:translate-y-0 lg:bottom-auto lg:left-auto lg:right-auto lg:overflow-visible lg:max-h-none lg:max-w-md lg:rounded-2xl lg:p-10 lg:shadow-2xl lg:border lg:border-white/5 lg:bg-nubepal-card/50 lg:backdrop-blur-xl" 
                :class="mobileLoginOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'">

                <div class="p-8 pb-20 lg:p-0 lg:pb-0">
                    <div class="w-16 h-1.5 bg-blue-800/40 rounded-full mx-auto mb-8 lg:hidden sticky top-0"></div>

                    <div class="text-left mb-8 lg:text-center">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                            <span class="lg:hidden material-icons-round text-accent">account_circle</span>
                            Bienvenido
                        </h2>
                        <p class="text-blue-300 text-sm mt-1">Ingresa tus credenciales corporativas.</p>
                    </div>

                    <form action="https://nubepal.com:2096/login/" method="POST" class="space-y-5">
                        <input type="hidden" name="login_theme" value="jupiter">
                        <input type="hidden" name="goto_uri" value="/">

                        <div class="group">
                            <label class="block text-xs font-bold text-blue-300 mb-2 uppercase tracking-wider ml-1">Correo</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-blue-400">
                                    <span class="material-icons-round">alternate_email</span>
                                </span>
                                <input
                                    class="block w-full rounded-xl bg-nubepal-input border border-transparent focus:border-accent py-3.5 pl-12 px-4 text-white placeholder:text-blue-500/40 focus:ring-0 sm:text-sm transition-colors focus:scroll-mt-24"
                                    id="user" name="user" placeholder="nombre@empresa.eirl.com.pe" type="email"
                                    autocomplete="username" required />
                            </div>
                        </div>

                        <div class="group">
                            <div class="flex items-center justify-between mb-2 ml-1">
                                <label class="block text-xs font-bold text-blue-300 uppercase tracking-wider">Contraseña</label>
                                <a href="https://wa.me/51965699252" class="text-xs text-accent hover:text-white transition-colors">¿Olvidaste?</a>
                            </div>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-blue-400">
                                    <span class="material-icons-round">lock</span>
                                </span>
                                <input
                                    class="block w-full rounded-xl bg-nubepal-input border border-transparent focus:border-accent py-3.5 pl-12 px-4 text-white placeholder:text-blue-500/40 focus:ring-0 sm:text-sm transition-colors focus:scroll-mt-24"
                                    id="pass" name="pass" type="password" placeholder="••••••••••••"
                                    autocomplete="current-password" required />
                            </div>
                        </div>

                        <div class="pt-4">
                            <button
                                class="w-full flex justify-center items-center gap-2 rounded-xl bg-primary hover:bg-blue-600 px-4 py-4 text-sm font-bold text-white shadow-lg shadow-blue-900/50 transition-all duration-200 active:scale-98"
                                type="submit">
                                VER EMAILS RECIBIDOS
                                <span class="material-icons-round text-lg">arrow_forward</span>
                            </button>
                        </div>
                    </form>

                    <div class="mt-6 text-center lg:hidden">
                        <button @click="mobileLoginOpen = false" class="text-blue-400 text-sm py-3 px-6 rounded-lg hover:bg-white/5 transition-colors">Cancelar</button>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-6 right-6 z-[45]" x-show="!mobileLoginOpen"
                x-transition:enter="transition ease-out duration-300" x-transition:enter-start="scale-0"
                x-transition:enter-end="scale-100">
                <a href="https://wa.me/51965699252"
                    class="bg-[#25D366] hover:bg-[#20bd5a] text-white rounded-full shadow-glow shadow-green-900/20 transition-transform hover:scale-110 flex items-center justify-center w-14 h-14">
                    <svg viewBox="0 0 24 24" class="w-7 h-7 fill-current">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                    </svg>
                </a>
            </div>

        </div>
    </div>
</body>

</html>
